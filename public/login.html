<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inloggen — Lead Hunter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f7fa;
      --card: #ffffff;
      --text: #1a2332;
      --text-dim: #5a6783;
      --text-faint: #8a96b0;
      --border: #e1e6ed;
      --border-strong: #c8d0db;
      --accent: #00b4a4;
      --accent-dim: #009889;
      --accent-soft: #e0f5f3;
      --danger: #e53e5c;
      --danger-soft: #ffe5ea;
      --shadow: 0 4px 24px rgba(20, 30, 50, 0.06);
      --shadow-lg: 0 12px 48px rgba(20, 30, 50, 0.12);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background-image:
        radial-gradient(circle at 20% 20%, rgba(0, 180, 164, 0.06), transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(0, 180, 164, 0.04), transparent 50%);
    }
    .login-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow-lg);
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }
    .logo-icon {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 18px;
    }
    .logo-text {
      font-weight: 700;
      font-size: 20px;
      color: var(--text);
    }
    .logo-text span { color: var(--accent); }
    h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 6px;
      letter-spacing: -0.01em;
    }
    .subtitle {
      color: var(--text-dim);
      font-size: 14px;
      margin-bottom: 28px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 6px;
      margin-top: 16px;
    }
    label:first-of-type { margin-top: 0; }
    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      font-size: 14px;
      font-family: inherit;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      transition: all 0.15s;
    }
    input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0, 180, 164, 0.12);
    }
    input::placeholder { color: var(--text-faint); }
    button {
      width: 100%;
      padding: 12px 14px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
      margin-top: 24px;
    }
    button:hover:not(:disabled) {
      background: var(--accent-dim);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(0, 180, 164, 0.25);
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .error {
      background: var(--danger-soft);
      color: var(--danger);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-top: 16px;
      display: none;
    }
    .error.show { display: block; animation: shake 0.3s; }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }
    .footer-note {
      text-align: center;
      color: var(--text-faint);
      font-size: 12px;
      margin-top: 24px;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">
      <div class="logo-icon">L</div>
      <div class="logo-text">Lead<span>Hunter</span></div>
    </div>

    <h1>Welkom terug</h1>
    <p class="subtitle">Log in om door te gaan naar je dashboard</p>

    <form id="loginForm">
      <label for="username">Gebruikersnaam</label>
      <input type="text" id="username" autocomplete="username" required autofocus>

      <label for="password">Wachtwoord</label>
      <input type="password" id="password" autocomplete="current-password" required>

      <div class="error" id="errorBox"></div>

      <button type="submit" id="submitBtn">Inloggen</button>
    </form>

    <p class="footer-note">Lead Hunter · Aitomade</p>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const errorBox = document.getElementById('errorBox');
    const submitBtn = document.getElementById('submitBtn');

    // Als al ingelogd, redirect naar dashboard
    fetch('/api/me').then(r => r.json()).then(d => {
      if (d.authenticated) window.location = '/';
    }).catch(() => {});

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorBox.classList.remove('show');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Bezig...';

      try {
        const resp = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value,
          }),
        });
        const data = await resp.json();
        if (!resp.ok) {
          errorBox.textContent = data.error || 'Inloggen mislukt';
          errorBox.classList.add('show');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Inloggen';
          return;
        }
        window.location = '/';
      } catch (err) {
        errorBox.textContent = 'Netwerkfout: ' + err.message;
        errorBox.classList.add('show');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Inloggen';
      }
    });
  </script>
</body>
</html>
